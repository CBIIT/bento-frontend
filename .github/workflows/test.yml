name: Test
permissions: 
  contents: read 
  id-token: write 
on:
  workflow_dispatch:
jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    env:
        ECR_REPOSITORY: bento-frontend
        IMAGE_TAG: build_test
    steps:

    - name: Check out code
      uses: actions/checkout@v2

    - name: Get Tags
      run: |
        git fetch --tags --force --quiet
        tags=$(git tag -l ga_test1* | tail -1 | cut -d "-" -f2-)
        tags2=$(git tag -l $GITHUB_REF_NAME* | tail -1 | cut -d "-" -f2-)
        echo $GITHUB_REF_NAME
        echo "$tags"
        echo "$tags2"
